<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin · Our Way of Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Libre Franklin", sans-serif;
    background: #fffcf5;
    color: #2d2d2d;
    line-height: 1.5;
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 4rem 1.5rem; }
  h1 {
    font-family: "Source Serif 4", Georgia, serif;
    color: #5c3a1e;
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }
  .lead { color: #8b7355; font-size: 1rem; margin-bottom: 2.5rem; }

  .cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
  }
  @media (max-width: 600px) { .cards { grid-template-columns: 1fr; } }

  .card {
    display: block;
    background: #fff;
    border: 1px solid #ece4d8;
    border-radius: 10px;
    padding: 1.5rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover {
    border-color: #daa520;
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(92,58,30,0.08);
  }
  .card h2 {
    font-family: "Source Serif 4", Georgia, serif;
    color: #5c3a1e;
    font-size: 1.25rem;
    margin-bottom: 0.4rem;
  }
  .card p { color: #8b7355; font-size: 0.9rem; }

  .signout {
    display: inline-block;
    margin-top: 2rem;
    color: #8b7355;
    font-size: 0.85rem;
    text-decoration: none;
  }
  .signout:hover { color: #5c3a1e; text-decoration: underline; }

  /* Login screen */
  .login {
    max-width: 420px; margin: 5rem auto;
    background: #fff; padding: 2rem; border-radius: 8px; border: 1px solid #ece4d8;
  }
  .login h1 { font-size: 1.6rem; margin: 0 0 0.5rem; }
  .login p { color: #8b7355; font-size: 0.9rem; margin: 0 0 1.2rem; }
  .login input {
    width: 100%; padding: 0.7rem; border: 2px solid #ece4d8; border-radius: 6px;
    font-family: inherit; font-size: 0.95rem;
  }
  .login button {
    width: 100%; padding: 0.7rem; background: #5c3a1e; color: #fff; border: none;
    border-radius: 6px; font-family: inherit; font-weight: 600; cursor: pointer; margin-top: 0.75rem;
  }
  .login .err { color: #a83333; font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }
</style>
</head>
<body>

<div id="loginScreen" class="login" style="display:none;">
  <h1>Admin</h1>
  <p>Enter the admin password to continue.</p>
  <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password">
  <button onclick="tryLogin()">Sign in</button>
  <div class="err" id="loginErr"></div>
</div>

<div id="chooserScreen" class="wrap" style="display:none;">
  <h1>Site editor</h1>
  <p class="lead">Choose what to edit.</p>
  <div class="cards">
    <a class="card" href="/admin/story/">
      <h2>Story form →</h2>
      <p>Header text, basic-info field labels, story prompts, button labels, modal text.</p>
    </a>
    <a class="card" href="/admin/timeline/">
      <h2>Timeline page →</h2>
      <p>Event headings, descriptions, participant quotes, video captions.</p>
    </a>
  </div>
  <a class="signout" href="#" onclick="logout(); return false;">Sign out</a>
</div>

<script>
  const PW_KEY = 'admin_pw';
  const getPw = () => sessionStorage.getItem(PW_KEY) || '';
  const setPw = p => sessionStorage.setItem(PW_KEY, p);
  const clearPw = () => sessionStorage.removeItem(PW_KEY);

  async function tryLogin() {
    const errEl = document.getElementById('loginErr');
    errEl.textContent = '';
    const pw = document.getElementById('passwordInput').value;
    if (!pw) { errEl.textContent = 'Enter a password.'; return; }
    setPw(pw);
    const res = await fetch('/.netlify/functions/save-content?surface=story', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + pw },
      body: JSON.stringify({ probe: true }),
    });
    if (res.status === 401) { clearPw(); errEl.textContent = 'Wrong password.'; return; }
    if (!res.ok) { clearPw(); errEl.textContent = 'Server error.'; return; }
    showChooser();
  }
  function logout() {
    clearPw();
    document.getElementById('chooserScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = '';
  }
  function showChooser() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('chooserScreen').style.display = '';
  }

  if (getPw()) {
    showChooser();
  } else {
    document.getElementById('loginScreen').style.display = '';
    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryLogin();
    });
  }
</script>
</body>
</html>
