<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin · Our Way of Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Mirrors story/index.html base look ─────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Libre Franklin", sans-serif;
    background-color: #fffcf5;
    color: #2d2d2d;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 6.5rem;
  }

  /* ── Page header (same as form) ─────────────────────── */
  .page-header {
    text-align: center;
    padding: 2.5rem 1.5rem 1rem;
    max-width: 700px;
    margin: 0 auto;
  }
  .page-header h1 {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 2.2rem; font-weight: 700; color: #5c3a1e; margin-bottom: 0;
  }
  .page-header h2 {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 2.2rem; font-weight: 700; color: #c4751a;
    text-decoration: underline; text-decoration-color: #c4751a;
    text-underline-offset: 0.35rem; text-decoration-thickness: 2px; margin-bottom: 1rem;
  }
  .page-header p {
    font-size: 1.05rem; color: #8b7355; font-weight: 300;
    max-width: 560px; margin: 0 auto 0.7rem; line-height: 1.6;
  }

  /* ── Stories sidebar block ──────────────────────────── */
  .stories-block {
    max-width: 700px; margin: 0 auto 2rem; padding: 0 1.5rem;
  }
  .stories-heading {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 1rem; font-weight: 600; color: #8b7355;
    text-align: center; margin: 0 0 1rem; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .story-card {
    background: #fef3c7; border: 1px solid #f0e4c8; border-radius: 10px;
    padding: 1rem; margin-bottom: 0.75rem;
  }
  .story-card .quote {
    font-style: italic; font-size: 0.9rem; color: #5c3a1e; line-height: 1.5; margin-bottom: 0.5rem;
  }
  .story-card .attribution {
    font-size: 0.78rem; color: #8b7355; font-weight: 600;
  }

  /* ── Form section card (looks like the actual form) ─── */
  .form-container {
    max-width: 700px; margin: 0 auto 2rem; padding: 0 1.5rem;
  }
  .page-marker {
    display: flex; align-items: center; gap: 0.6rem;
    margin: 2rem 0 0.6rem;
    font-size: 0.7rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: #8b7355; font-weight: 600;
  }
  .page-marker .rule { flex: 1; height: 1px; background: #ece4d8; }

  .form-section {
    background: #fff;
    border: 1px solid #ece4d8;
    border-radius: 10px;
    padding: 1.5rem 1.5rem 1.25rem;
    margin-bottom: 0.5rem;
  }

  .prompt-text {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 1.4rem; font-weight: 600; color: #5c3a1e;
    margin-bottom: 1rem; line-height: 1.4;
  }
  .prompt-sub {
    font-size: 1rem; color: #7a6347; line-height: 1.5; margin-bottom: 1.25rem;
  }

  /* ── Basic info layout (matches form) ───────────────── */
  .basic-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem 0.75rem; }
  .basic-field { display: flex; flex-direction: column; gap: 0.3rem; }
  .basic-field.full-width { grid-column: 1 / -1; }
  .field-row-3 { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
  .field-row-2 { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
  .basic-field label {
    font-size: 0.85rem; font-weight: 600; color: #5c3a1e;
  }
  .input-shell {
    border: 2px solid #ece4d8; border-radius: 6px;
    padding: 0.6rem 0.9rem; background: #fff; min-height: 2.4rem;
  }

  /* ── Mock buttons (look like form's buttons) ────────── */
  .btn-row-mock { display: flex; justify-content: space-between; gap: 1rem; margin-top: 1.5rem; }
  .mock-btn {
    font-family: "Libre Franklin", sans-serif;
    font-size: 0.9rem; font-weight: 600;
    padding: 0.65rem 1.4rem; border-radius: 6px; border: none;
    pointer-events: none; min-width: 5rem;
  }
  .mock-btn.next { background: #daa520; color: #fff; }
  .mock-btn.skip { background: transparent; color: #8b7355; border: 1px solid #ece4d8; }
  .mock-btn.back { background: transparent; color: #8b7355; padding: 0.65rem 1rem; }
  .mock-btn.submit { background: #5c3a1e; color: #fff; padding: 0.75rem 2rem; font-size: 1rem; }
  .mock-btn .editable { color: inherit; min-width: 3rem; text-align: center; }

  /* ── Or divider, record button, etc. ────────────────── */
  .or-divider {
    text-align: center; font-size: 0.85rem; color: #8b7355; margin: 1rem 0; position: relative;
  }
  .or-divider .editable { display: inline-block; padding: 0 0.6rem; background: #fff; position: relative; z-index: 1; }
  .or-divider::before { content: ""; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #ece4d8; }

  .record-mock {
    display: flex; align-items: center; justify-content: center;
    width: 100%; padding: 0.9rem 1.5rem;
    border: 2px solid #ece4d8; border-radius: 8px; background: #fff;
    font-size: 0.95rem; font-weight: 600; color: #5c3a1e;
    margin-top: 0.5rem;
  }

  .upload-mock {
    display: flex; align-items: center; justify-content: center;
    width: 100%; padding: 0.9rem 1.5rem;
    border: 2px solid #ece4d8; border-radius: 8px; background: #fff;
    font-size: 0.95rem; font-weight: 600; color: #5c3a1e;
    margin-top: 0.5rem;
  }
  .upload-hint { text-align: center; font-size: 0.78rem; color: #8b7355; margin-top: 0.5rem; font-style: italic; }

  /* ── Editable text inherits parent styling ──────────── */
  .editable {
    display: block;
    font: inherit;
    color: inherit;
    line-height: inherit;
    background: transparent;
    border: 1.5px dashed transparent;
    border-radius: 4px;
    padding: 0.05rem 0.4rem;
    margin: -0.05rem -0.4rem;
    cursor: text;
    transition: border-color 0.15s ease, background 0.15s ease;
    min-height: 1em;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .editable:empty::before {
    content: attr(data-placeholder);
    color: #bfae94;
    font-style: italic;
    pointer-events: none;
  }
  .editable:hover {
    border-color: #ece4d8;
    background: rgba(255,255,255,0.6);
  }
  .editable:focus {
    border-color: #daa520;
    background: #fffaf0;
    outline: none;
  }
  /* Inline editable inside a button mock or short label */
  .editable.inline { display: inline-block; min-width: 3rem; }

  /* ── Placeholder editor inside an input shell ──────── */
  .placeholder-editable {
    font-style: italic;
    color: #bfae94;
    font-size: 0.9rem;
  }

  /* ── Top floating panel ─────────────────────────────── */
  .top-panel {
    position: fixed;
    top: 1rem; right: 1rem;
    display: flex; align-items: center; gap: 0.75rem;
    z-index: 100;
  }
  .top-panel .lang-pills {
    display: flex; gap: 0.3rem;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(4px);
    border-radius: 8px;
    padding: 0.25rem;
    border: 1px solid #ece4d8;
    box-shadow: 0 1px 4px rgba(92,58,30,0.08);
  }
  .top-panel .lang-pills button {
    font-family: inherit;
    font-size: 0.8rem; font-weight: 600;
    padding: 0.35rem 0.85rem;
    border: 1.5px solid transparent;
    border-radius: 5px;
    background: transparent;
    color: #8b7355;
    cursor: pointer;
    opacity: 0.6;
  }
  .top-panel .lang-pills button.active { opacity: 1; border-color: #daa520; color: #5c3a1e; background: #fff; }
  .top-panel .signout {
    color: #8b7355; font-size: 0.8rem; text-decoration: none;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(4px);
    padding: 0.4rem 0.7rem;
    border-radius: 6px;
    border: 1px solid #ece4d8;
  }
  .top-panel .signout:hover { color: #5c3a1e; }

  /* ── Save bar (sticky bottom) ───────────────────────── */
  .save-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,252,245,0.96);
    border-top: 1px solid #ece4d8;
    padding: 0.85rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 1rem;
    backdrop-filter: blur(6px);
    z-index: 50;
  }
  .btn-save {
    background: #5c3a1e; color: #fff; border: none;
    padding: 0.7rem 1.4rem; border-radius: 6px;
    font-family: inherit; font-weight: 600; font-size: 0.95rem; cursor: pointer;
  }
  .btn-save:hover { background: #4a2e16; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-revert {
    background: transparent; color: #8b7355; border: 1.5px solid #ece4d8;
    padding: 0.7rem 1.2rem; border-radius: 6px;
    font-family: inherit; font-weight: 600; font-size: 0.9rem; cursor: pointer;
  }
  .btn-revert:hover { background: #fffaf0; border-color: #daa520; color: #5c3a1e; }
  .btn-revert:disabled { opacity: 0.5; cursor: not-allowed; }
  .save-status { font-size: 0.85rem; color: #8b7355; }
  .save-status.success { color: #2d6e2d; }
  .save-status.error { color: #a83333; }

  /* ── Login screen ───────────────────────────────────── */
  .login {
    max-width: 420px; margin: 5rem auto;
    background: #fff; padding: 2rem; border-radius: 8px; border: 1px solid #ece4d8;
  }
  .login h1 {
    font-family: "Source Serif 4", Georgia, serif;
    color: #5c3a1e; margin: 0 0 0.5rem; font-size: 1.6rem;
  }
  .login p { color: #8b7355; font-size: 0.9rem; margin: 0 0 1.2rem; }
  .login input {
    width: 100%; padding: 0.7rem; border: 2px solid #ece4d8; border-radius: 6px;
    font-family: inherit; font-size: 0.95rem;
  }
  .login button {
    width: 100%; padding: 0.7rem; background: #5c3a1e; color: #fff; border: none;
    border-radius: 6px; font-family: inherit; font-weight: 600; cursor: pointer; margin-top: 0.75rem;
  }
  .login .err { color: #a83333; font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }

  /* ── Add-question button between cards ─────────────── */
  .add-q-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    margin: 0.4rem 0;
    padding: 0.45rem;
    border: 1.5px dashed #d8cdb9;
    border-radius: 6px;
    background: transparent;
    color: #8b7355;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .add-q-btn:hover {
    border-color: #daa520;
    border-style: solid;
    background: #fffaf0;
    color: #5c3a1e;
  }

  /* ── Trash button on a question card ───────────────── */
  .is-question-card { position: relative; }
  .card-trash {
    position: absolute;
    top: 0.7rem;
    right: 0.7rem;
    background: rgba(255,255,255,0.6);
    border: 1px solid #ece4d8;
    width: 30px;
    height: 30px;
    border-radius: 5px;
    cursor: pointer;
    color: #a8987b;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    font-size: 1rem;
    transition: all 0.15s;
    z-index: 5;
  }
  .card-trash:hover {
    border-color: #e8b4b4;
    color: #a83333;
    background: #fdf3f3;
  }

  /* Modal preview block */
  .modal-preview {
    background: #fffcf5; border: 1px solid #ece4d8;
    border-radius: 12px; padding: 1.5rem;
    box-shadow: 0 6px 18px rgba(92,58,30,0.12);
  }
  .modal-preview h3 {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 1.4rem; color: #5c3a1e; margin-bottom: 0.7rem;
  }
  .modal-preview p { font-size: 0.95rem; color: #8b7355; line-height: 1.6; margin-bottom: 1.2rem; }
  .modal-preview .btn-row-mock { justify-content: flex-end; }
</style>
<script src="../../content.js"></script>
</head>
<body>

<!-- Login -->
<div id="loginScreen" class="login" style="display:none;">
  <h1>Admin</h1>
  <p>Enter the admin password to edit site content.</p>
  <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password">
  <button onclick="tryLogin()">Sign in</button>
  <div class="err" id="loginErr"></div>
</div>

<!-- Editor -->
<div id="editorScreen" style="display:none;">
  <div class="top-panel">
    <a class="signout" href="/admin/">← All editors</a>
    <div class="lang-pills" id="langPills">
      <button class="active" data-lang="en">English</button>
      <button data-lang="es">Spanish</button>
      <button data-lang="zh">中文</button>
    </div>
    <a class="signout" href="#" onclick="logout(); return false;">Sign out</a>
  </div>

  <div id="editorBody"></div>

  <div class="save-bar">
    <span class="save-status" id="saveStatus"></span>
    <button class="btn-revert" id="revertBtn" onclick="revert()" title="Restore the site to the frozen baseline snapshot — overwrites any saved changes">Revert to baseline</button>
    <button class="btn-save" id="saveBtn" onclick="save()">Save changes</button>
  </div>
</div>

<script>
  // ── Auth ────────────────────────────────────────────────
  const PW_KEY = 'admin_pw';
  const getPw = () => sessionStorage.getItem(PW_KEY) || '';
  const setPw = p => sessionStorage.setItem(PW_KEY, p);
  const clearPw = () => sessionStorage.removeItem(PW_KEY);

  async function tryLogin() {
    const errEl = document.getElementById('loginErr');
    errEl.textContent = '';
    const pw = document.getElementById('passwordInput').value;
    if (!pw) { errEl.textContent = 'Enter a password.'; return; }
    setPw(pw);
    const res = await fetch('/.netlify/functions/save-content?surface=story', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + pw },
      body: JSON.stringify({ probe: true }),
    });
    if (res.status === 401) { clearPw(); errEl.textContent = 'Wrong password.'; return; }
    if (!res.ok) { clearPw(); errEl.textContent = 'Server error. Check ADMIN_PASSWORD.'; return; }
    await loadAndRender();
    showEditor();
  }
  function logout() {
    clearPw();
    document.getElementById('editorScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = '';
  }
  function showEditor() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('editorScreen').style.display = '';
  }

  // ── State ───────────────────────────────────────────────
  let i18nState = {};
  let questionsState = [];
  let currentLang = 'en';
  const LANG_NAMES = { en: 'English', es: 'Español', zh: '中文' };
  const deepClone = o => JSON.parse(JSON.stringify(o));

  async function loadAndRender() {
    i18nState = deepClone(window.defaultContent.i18n);
    questionsState = deepClone(window.defaultContent.questions);
    try {
      const res = await fetch('/.netlify/functions/get-content?surface=story', { cache: 'no-cache' });
      const overrides = res.ok ? await res.json() : null;
      if (overrides) {
        if (overrides.i18n) {
          for (const key of Object.keys(overrides.i18n)) {
            if (!i18nState[key]) i18nState[key] = { en: '', es: '', zh: '' };
            for (const lang of ['en','es','zh']) {
              const v = overrides.i18n[key][lang];
              if (typeof v === 'string' && v.trim()) i18nState[key][lang] = v;
            }
          }
        }
        if (Array.isArray(overrides.questions)) questionsState = overrides.questions;
      }
    } catch (_) {}
    renderEditor();
  }

  // ── Render helpers ──────────────────────────────────────
  function makeEditable(opts) {
    // opts: { source: 'i18n'|'question', key (i18n) | question+qProp, className?, placeholder? }
    const el = document.createElement('div');
    el.className = 'editable ' + (opts.className || '');
    el.contentEditable = 'plaintext-only';
    el.setAttribute('data-placeholder', opts.placeholder || LANG_NAMES[currentLang]);
    if (opts.source === 'i18n') {
      el.dataset.editKey = opts.key;
      el.textContent = (i18nState[opts.key] && i18nState[opts.key][currentLang]) || '';
      el.addEventListener('input', () => {
        if (!i18nState[opts.key]) i18nState[opts.key] = { en: '', es: '', zh: '' };
        i18nState[opts.key][currentLang] = el.textContent;
      });
    } else {
      const q = opts.question;
      el.dataset.qId = q.id;
      el.dataset.qProp = opts.qProp;
      el.textContent = (q[opts.qProp] && q[opts.qProp][currentLang]) || '';
      el.addEventListener('input', () => {
        if (!q[opts.qProp]) q[opts.qProp] = { en: '', es: '', zh: '' };
        q[opts.qProp][currentLang] = el.textContent;
      });
    }
    return el;
  }

  function pageMarker(text) {
    const div = document.createElement('div');
    div.className = 'page-marker';
    div.innerHTML = `<span class="rule"></span><span>${text}</span><span class="rule"></span>`;
    return div;
  }

  function makeFormSection(content) {
    const sec = document.createElement('div');
    sec.className = 'form-section';
    if (typeof content === 'function') content(sec);
    return sec;
  }

  function makePromptText(key) {
    const div = document.createElement('div');
    div.className = 'prompt-text';
    div.appendChild(makeEditable({ source: 'i18n', key }));
    return div;
  }
  function makePromptSub(key) {
    const div = document.createElement('div');
    div.className = 'prompt-sub';
    div.appendChild(makeEditable({ source: 'i18n', key }));
    return div;
  }

  function makeField(opts) {
    // opts: { labelKey, placeholderKey?, fullWidth? }
    const wrap = document.createElement('div');
    wrap.className = 'basic-field' + (opts.fullWidth ? ' full-width' : '');
    const label = document.createElement('label');
    label.appendChild(makeEditable({ source: 'i18n', key: opts.labelKey }));
    wrap.appendChild(label);
    const shell = document.createElement('div');
    shell.className = 'input-shell';
    if (opts.placeholderKey) {
      shell.appendChild(makeEditable({ source: 'i18n', key: opts.placeholderKey, className: 'placeholder-editable' }));
    } else {
      shell.style.background = '#faf6ee';
      shell.style.borderStyle = 'dashed';
      shell.style.color = '#bfae94';
      shell.style.fontStyle = 'italic';
      shell.style.fontSize = '0.9rem';
      shell.textContent = '(no placeholder)';
    }
    wrap.appendChild(shell);
    return wrap;
  }

  function makeFieldRow3(fields) {
    const row = document.createElement('div');
    row.className = 'field-row-3';
    fields.forEach(f => row.appendChild(f));
    return row;
  }
  function makeFieldRow2(fields) {
    const row = document.createElement('div');
    row.className = 'field-row-2';
    fields.forEach(f => row.appendChild(f));
    return row;
  }

  function makeRadioPair(labelKey, opt1Key, opt2Key) {
    const wrap = document.createElement('div');
    wrap.className = 'basic-field full-width';
    wrap.style.gridColumn = '1 / -1';
    const lbl = document.createElement('label');
    lbl.appendChild(makeEditable({ source: 'i18n', key: labelKey }));
    wrap.appendChild(lbl);
    const opts = document.createElement('div');
    opts.style.display = 'flex';
    opts.style.gap = '1rem';
    opts.style.marginTop = '0.4rem';
    [opt1Key, opt2Key].forEach(k => {
      const o = document.createElement('label');
      o.style.display = 'inline-flex';
      o.style.alignItems = 'center';
      o.style.gap = '0.4rem';
      o.style.fontSize = '0.9rem';
      o.style.color = '#5c3a1e';
      const radio = document.createElement('span');
      radio.style.cssText = 'display:inline-block;width:1rem;height:1rem;border:2px solid #ece4d8;border-radius:50%;background:#fff;flex-shrink:0;';
      o.appendChild(radio);
      o.appendChild(makeEditable({ source: 'i18n', key: k, className: 'inline' }));
      opts.appendChild(o);
    });
    wrap.appendChild(opts);
    return wrap;
  }

  function makeSelect(labelKey, optionKeys) {
    const wrap = document.createElement('div');
    wrap.className = 'basic-field';
    const lbl = document.createElement('label');
    lbl.appendChild(makeEditable({ source: 'i18n', key: labelKey }));
    wrap.appendChild(lbl);
    const shell = document.createElement('div');
    shell.className = 'input-shell';
    shell.style.padding = '0.4rem 0.7rem';
    optionKeys.forEach(k => {
      const opt = document.createElement('div');
      opt.style.padding = '0.15rem 0';
      opt.style.fontSize = '0.9rem';
      opt.style.color = '#5c3a1e';
      opt.appendChild(makeEditable({ source: 'i18n', key: k, className: 'inline' }));
      shell.appendChild(opt);
    });
    wrap.appendChild(shell);
    return wrap;
  }

  function btnRow(includeBack, nextKey, nextClass = 'next', skipKey = 'btn-skip') {
    const row = document.createElement('div');
    row.className = 'btn-row-mock';
    if (includeBack) {
      const back = document.createElement('span');
      back.className = 'mock-btn back';
      back.appendChild(makeEditable({ source: 'i18n', key: 'btn-back', className: 'inline' }));
      row.appendChild(back);
    } else {
      row.appendChild(document.createElement('span'));
    }
    const right = document.createElement('div');
    right.style.display = 'flex'; right.style.gap = '0.6rem';
    if (skipKey) {
      const skip = document.createElement('span');
      skip.className = 'mock-btn skip';
      skip.appendChild(makeEditable({ source: 'i18n', key: skipKey, className: 'inline' }));
      right.appendChild(skip);
    }
    const next = document.createElement('span');
    next.className = 'mock-btn ' + nextClass;
    next.appendChild(makeEditable({ source: 'i18n', key: nextKey, className: 'inline' }));
    right.appendChild(next);
    row.appendChild(right);
    return row;
  }

  // ── Add / delete questions ──────────────────────────────
  function makeAddQBtn(displayIdx) {
    const btn = document.createElement('button');
    btn.className = 'add-q-btn';
    btn.type = 'button';
    btn.textContent = '+ Add question';
    btn.addEventListener('click', () => addQuestionAt(displayIdx));
    return btn;
  }

  function addQuestionAt(displayIdx) {
    const newQ = {
      id: 'custom-' + Date.now().toString(36),
      type: 'question',
      prompt: { en: '', es: '', zh: '' },
      sub: { en: '', es: '', zh: '' },
    };
    const filtered = questionsState.filter(q => q.type !== 'section');
    if (filtered.length === 0) {
      questionsState.push(newQ);
    } else if (displayIdx <= 0) {
      const firstIdx = questionsState.findIndex(q => q.type !== 'section');
      questionsState.splice(firstIdx, 0, newQ);
    } else if (displayIdx >= filtered.length) {
      const lastQ = filtered[filtered.length - 1];
      const lastIdx = questionsState.findIndex(q => q.id === lastQ.id);
      questionsState.splice(lastIdx + 1, 0, newQ);
    } else {
      const prevQ = filtered[displayIdx - 1];
      const prevIdx = questionsState.findIndex(q => q.id === prevQ.id);
      questionsState.splice(prevIdx + 1, 0, newQ);
    }
    renderEditor();
    setTimeout(() => {
      const cards = document.querySelectorAll('.is-question-card');
      const target = cards[displayIdx];
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const firstEditable = target.querySelector('.editable');
        if (firstEditable) firstEditable.focus();
      }
    }, 50);
  }

  function deleteQuestionByDisplayIdx(displayIdx) {
    const filtered = questionsState.filter(q => q.type !== 'section');
    const target = filtered[displayIdx];
    if (!target) return;
    const preview = (target.prompt && target.prompt.en) || target.id;
    const trimmed = preview.length > 80 ? preview.slice(0, 80) + '…' : preview;
    if (!confirm(`Delete this question? This will remove the page from the form.\n\n"${trimmed}"`)) return;
    const idx = questionsState.findIndex(q => q.id === target.id);
    if (idx !== -1) questionsState.splice(idx, 1);
    renderEditor();
  }

  function recorderBlock() {
    const wrap = document.createElement('div');
    wrap.style.marginTop = '0.5rem';
    const div = document.createElement('div');
    div.className = 'or-divider';
    div.appendChild(makeEditable({ source: 'i18n', key: 'divider-or', className: 'inline' }));
    wrap.appendChild(div);
    const rec = document.createElement('div');
    rec.className = 'record-mock';
    rec.appendChild(makeEditable({ source: 'i18n', key: 'btn-record', className: 'inline' }));
    wrap.appendChild(rec);
    return wrap;
  }

  // ── Render the editor ───────────────────────────────────
  function renderEditor() {
    const body = document.getElementById('editorBody');
    body.innerHTML = '';

    // ── Page header ───────────────────────────────────────
    const header = document.createElement('div');
    header.className = 'page-header';
    const h1 = document.createElement('h1');
    h1.appendChild(makeEditable({ source: 'i18n', key: 'header-title' }));
    header.appendChild(h1);
    const h2 = document.createElement('h2');
    h2.appendChild(makeEditable({ source: 'i18n', key: 'header-subtitle' }));
    header.appendChild(h2);
    const desc = document.createElement('p');
    desc.appendChild(makeEditable({ source: 'i18n', key: 'header-desc', rows: 3 }));
    header.appendChild(desc);
    body.appendChild(header);

    // ── Stories sidebar ───────────────────────────────────
    const stories = document.createElement('div');
    stories.className = 'stories-block';
    const sh = document.createElement('div');
    sh.className = 'stories-heading';
    sh.appendChild(makeEditable({ source: 'i18n', key: 'stories-heading', className: 'inline' }));
    stories.appendChild(sh);
    [['quote-1','attr-1'], ['quote-kwanzaa','attr-kwanzaa'], ['quote-emwe','attr-emwe']].forEach(([qk, ak]) => {
      const card = document.createElement('div');
      card.className = 'story-card';
      const q = document.createElement('div'); q.className = 'quote';
      q.appendChild(makeEditable({ source: 'i18n', key: qk, rows: 2 }));
      card.appendChild(q);
      const a = document.createElement('div'); a.className = 'attribution';
      a.appendChild(makeEditable({ source: 'i18n', key: ak }));
      card.appendChild(a);
      stories.appendChild(card);
    });
    body.appendChild(stories);

    // ── Form pages container ──────────────────────────────
    const container = document.createElement('div');
    container.className = 'form-container';

    // Page 1: Basic info
    container.appendChild(pageMarker('Form page 1 · Basic info'));
    const basic = makeFormSection(sec => {
      sec.appendChild(makePromptText('prompt-basic'));
      const grid = document.createElement('div');
      grid.className = 'basic-fields';
      grid.appendChild(makeFieldRow3([
        makeField({ labelKey: 'label-age', placeholderKey: 'ph-age' }),
        makeField({ labelKey: 'label-gender', placeholderKey: 'ph-gender' }),
        makeField({ labelKey: 'label-ethnicity', placeholderKey: 'ph-ethnicity' }),
      ]));
      grid.appendChild(makeFieldRow2([
        makeField({ labelKey: 'label-country', placeholderKey: 'ph-country' }),
        makeField({ labelKey: 'label-language-spoken', placeholderKey: 'ph-language-spoken' }),
      ]));
      grid.appendChild(makeFieldRow3([
        makeField({ labelKey: 'label-years-us', placeholderKey: 'ph-years-us' }),
        makeField({ labelKey: 'label-years-city', placeholderKey: 'ph-years-city' }),
        makeSelect('label-education', ['opt-edu-blank','opt-edu-elementary','opt-edu-highschool','opt-edu-college','opt-edu-university']),
      ]));
      grid.appendChild(makeRadioPair('label-voted', 'opt-yes', 'opt-no'));
      grid.appendChild(makeField({ labelKey: 'label-volunteer', placeholderKey: 'ph-volunteer', fullWidth: true }));
      grid.appendChild(makeField({ labelKey: 'label-health', placeholderKey: 'ph-health', fullWidth: true }));
      grid.appendChild(makeField({ labelKey: 'label-email', placeholderKey: 'ph-email', fullWidth: true }));
      sec.appendChild(grid);
      sec.appendChild(btnRow(false, 'btn-next', 'next'));
    });
    container.appendChild(basic);

    // Page 2: Creative work
    container.appendChild(pageMarker('Form page 2 · Creative work'));
    const creative = makeFormSection(sec => {
      sec.appendChild(makePromptText('prompt-creative'));
      sec.appendChild(makePromptSub('sub-creative'));
      const ph = document.createElement('div');
      ph.className = 'input-shell';
      ph.style.minHeight = '6rem';
      ph.appendChild(makeEditable({ source: 'i18n', key: 'placeholder-creative', className: 'placeholder-editable', rows: 3 }));
      sec.appendChild(ph);
      const upload = document.createElement('div');
      upload.className = 'upload-mock';
      upload.appendChild(makeEditable({ source: 'i18n', key: 'btn-upload', className: 'inline' }));
      sec.appendChild(upload);
      const hint = document.createElement('div');
      hint.className = 'upload-hint';
      hint.appendChild(makeEditable({ source: 'i18n', key: 'upload-hint', className: 'inline' }));
      sec.appendChild(hint);
      sec.appendChild(btnRow(true, 'btn-next', 'next'));
    });
    container.appendChild(creative);

    // Question pages — with "+" between cards and a trash icon on each
    const questionItems = questionsState.filter(q => q.type !== 'section');
    container.appendChild(makeAddQBtn(0));
    questionItems.forEach((q, i, arr) => {
      const isLast = i === arr.length - 1;
      container.appendChild(pageMarker(`Form page · Story question ${i + 1}`));
      const sec = makeFormSection(s => {
        const prompt = document.createElement('div');
        prompt.className = 'prompt-text';
        prompt.appendChild(makeEditable({ source: 'question', question: q, qProp: 'prompt', rows: 3 }));
        s.appendChild(prompt);
        const sub = document.createElement('div');
        sub.className = 'prompt-sub';
        sub.appendChild(makeEditable({ source: 'question', question: q, qProp: 'sub', rows: 2 }));
        s.appendChild(sub);
        // Placeholder + recorder mock
        const ph = document.createElement('div');
        ph.className = 'input-shell';
        ph.style.minHeight = '6rem';
        ph.appendChild(makeEditable({ source: 'i18n', key: 'placeholder-answer', className: 'placeholder-editable', rows: 3 }));
        s.appendChild(ph);
        s.appendChild(recorderBlock());
        if (isLast) {
          s.appendChild(btnRow(true, 'btn-submit', 'submit', null));
          const note = document.createElement('p');
          note.style.cssText = 'text-align:center;font-size:0.85rem;font-style:italic;color:#a8987b;margin-top:1rem;';
          note.appendChild(makeEditable({ source: 'i18n', key: 'submit-note' }));
          s.appendChild(note);
        } else {
          s.appendChild(btnRow(true, 'btn-next', 'next'));
        }
      });
      sec.classList.add('is-question-card');
      const trash = document.createElement('button');
      trash.className = 'card-trash';
      trash.type = 'button';
      trash.title = 'Delete this question';
      trash.textContent = '🗑';
      trash.addEventListener('click', () => deleteQuestionByDisplayIdx(i));
      sec.appendChild(trash);
      container.appendChild(sec);
      container.appendChild(makeAddQBtn(i + 1));
    });

    body.appendChild(container);

    // ── Confirmation modal preview ────────────────────────
    container.appendChild(pageMarker('Confirmation modal'));
    const modal = document.createElement('div');
    modal.className = 'modal-preview';
    const mtitle = document.createElement('h3');
    mtitle.appendChild(makeEditable({ source: 'i18n', key: 'confirm-title' }));
    modal.appendChild(mtitle);
    const mdesc = document.createElement('p');
    mdesc.appendChild(makeEditable({ source: 'i18n', key: 'confirm-desc', rows: 2 }));
    modal.appendChild(mdesc);
    const mbtns = document.createElement('div');
    mbtns.className = 'btn-row-mock';
    const cancel = document.createElement('span');
    cancel.className = 'mock-btn skip';
    cancel.appendChild(makeEditable({ source: 'i18n', key: 'confirm-cancel', className: 'inline' }));
    mbtns.appendChild(cancel);
    const confirm = document.createElement('span');
    confirm.className = 'mock-btn submit';
    confirm.appendChild(makeEditable({ source: 'i18n', key: 'confirm-confirm', className: 'inline' }));
    mbtns.appendChild(confirm);
    modal.appendChild(mbtns);
    container.appendChild(modal);

    // ── Completion screen preview ─────────────────────────
    container.appendChild(pageMarker('Thank-you screen'));
    const completion = document.createElement('div');
    completion.style.cssText = 'background:#fff;border:1px solid #ece4d8;border-radius:10px;padding:2rem;text-align:center;';
    const ctitle = document.createElement('h2');
    ctitle.style.cssText = 'font-family:"Source Serif 4",Georgia,serif;font-size:1.8rem;color:#5c3a1e;margin-bottom:0.8rem;';
    ctitle.appendChild(makeEditable({ source: 'i18n', key: 'completion-title' }));
    completion.appendChild(ctitle);
    const cdesc = document.createElement('p');
    cdesc.style.cssText = 'font-size:1.05rem;color:#8b7355;max-width:450px;margin:0 auto;';
    cdesc.appendChild(makeEditable({ source: 'i18n', key: 'completion-desc', rows: 2 }));
    completion.appendChild(cdesc);
    container.appendChild(completion);

    // ── Status messages section ───────────────────────────
    container.appendChild(pageMarker('Status & misc messages'));
    const misc = document.createElement('div');
    misc.style.cssText = 'background:#fff;border:1px solid #ece4d8;border-radius:10px;padding:1.25rem;display:grid;grid-template-columns:1fr 1fr;gap:0.8rem 1.2rem;';
    [
      ['btn-stop-record','Stop recording button'],
      ['status-listening','Status · listening'],
      ['status-saved','Status · saved'],
      ['status-denied','Status · mic denied'],
      ['saved-label','Saved label'],
      ['upload-too-large','Error · upload too large'],
      ['upload-not-image','Error · upload not image'],
      ['upload-processing','Status · processing'],
      ['word-of','Word "of" (e.g. 1 of 9)'],
    ].forEach(([key, label]) => {
      const wrap = document.createElement('div');
      const lbl = document.createElement('div');
      lbl.style.cssText = 'font-size:0.7rem;font-weight:600;color:#a8987b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.2rem;';
      lbl.textContent = label;
      const ed = document.createElement('div');
      ed.style.cssText = 'border:1.5px solid #ece4d8;border-radius:6px;padding:0.4rem 0.6rem;background:#fff;font-size:0.9rem;';
      ed.appendChild(makeEditable({ source: 'i18n', key, className: 'inline' }));
      wrap.appendChild(lbl);
      wrap.appendChild(ed);
      misc.appendChild(wrap);
    });
    container.appendChild(misc);
  }

  // ── Language toggle ─────────────────────────────────────
  function setEditLang(lang) {
    currentLang = lang;
    document.querySelectorAll('#langPills button').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    document.querySelectorAll('.editable').forEach(el => {
      let value = '';
      if (el.dataset.editKey) {
        value = (i18nState[el.dataset.editKey] && i18nState[el.dataset.editKey][lang]) || '';
      } else if (el.dataset.qId) {
        const q = questionsState.find(x => x.id === el.dataset.qId);
        value = (q && q[el.dataset.qProp] && q[el.dataset.qProp][lang]) || '';
      }
      el.textContent = value;
      el.setAttribute('data-placeholder', LANG_NAMES[lang]);
    });
  }
  document.getElementById('langPills').addEventListener('click', e => {
    const btn = e.target.closest('button[data-lang]');
    if (btn) setEditLang(btn.dataset.lang);
  });

  // ── Save ────────────────────────────────────────────────
  function buildPayload() {
    const def = window.defaultContent;
    const i18nOut = {};
    for (const key of Object.keys(i18nState)) {
      const defaultEntry = def.i18n[key] || {};
      const entryOut = {};
      let hasOverride = false;
      for (const lang of ['en','es','zh']) {
        const v = (i18nState[key][lang] || '').trim();
        const dv = (defaultEntry[lang] || '').trim();
        if (v && v !== dv) { entryOut[lang] = i18nState[key][lang]; hasOverride = true; }
      }
      if (hasOverride) i18nOut[key] = entryOut;
    }
    return { i18n: i18nOut, questions: questionsState };
  }

  // Restores the site to a frozen baseline snapshot stored in the repo.
  // Overwrites any saves made since the snapshot was captured.
  async function revert() {
    if (!confirm('Restore the live site to the baseline snapshot? This will overwrite the current saved state — any saves made since the snapshot was captured will be lost.')) return;
    const status = document.getElementById('saveStatus');
    const revertBtn = document.getElementById('revertBtn');
    const saveBtn = document.getElementById('saveBtn');
    status.className = 'save-status';
    status.textContent = 'Reverting...';
    revertBtn.disabled = true;
    saveBtn.disabled = true;
    try {
      const baseline = await fetch('/snapshots/story-baseline.json', { cache: 'no-cache' }).then(r => {
        if (!r.ok) throw new Error('Baseline snapshot not found');
        return r.json();
      });
      const res = await fetch('/.netlify/functions/save-content?surface=story', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + getPw() },
        body: JSON.stringify(baseline),
      });
      if (res.status === 401) {
        clearPw();
        status.className = 'save-status error';
        status.textContent = 'Session expired — sign in again.';
        setTimeout(() => location.reload(), 1500);
        return;
      }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      await loadAndRender();
      status.className = 'save-status success';
      status.textContent = 'Reverted to baseline.';
      setTimeout(() => { status.textContent = ''; }, 3000);
    } catch (e) {
      status.className = 'save-status error';
      status.textContent = 'Revert failed: ' + (e.message || 'unknown');
      console.error(e);
    } finally {
      revertBtn.disabled = false;
      saveBtn.disabled = false;
    }
  }

  async function save() {
    const status = document.getElementById('saveStatus');
    const btn = document.getElementById('saveBtn');
    status.className = 'save-status';
    status.textContent = 'Saving...';
    btn.disabled = true;
    try {
      const res = await fetch('/.netlify/functions/save-content?surface=story', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + getPw() },
        body: JSON.stringify(buildPayload()),
      });
      if (res.status === 401) {
        clearPw();
        status.className = 'save-status error';
        status.textContent = 'Session expired — sign in again.';
        setTimeout(() => location.reload(), 1500);
        return;
      }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      status.className = 'save-status success';
      status.textContent = 'Saved.';
      setTimeout(() => { status.textContent = ''; }, 3000);
    } catch (e) {
      status.className = 'save-status error';
      status.textContent = 'Save failed.';
      console.error(e);
    } finally {
      btn.disabled = false;
    }
  }

  // ── Boot ────────────────────────────────────────────────
  (async function boot() {
    if (getPw()) {
      await loadAndRender();
      showEditor();
    } else {
      document.getElementById('loginScreen').style.display = '';
      document.getElementById('passwordInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') tryLogin();
      });
    }
  })();
</script>
